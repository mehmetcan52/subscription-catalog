name: Daily Subscription Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Her gece 00:00'da otomatik çalışır
  workflow_dispatch: # Manuel çalıştırma butonu ekler

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # 403 hatasını YAML seviyesinde de garantiye alıyoruz
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright beautifulsoup4 requests
          # Playwright'ın çalışması için gerekli tarayıcıyı ve sistem kütüphanelerini kurar
          playwright install chromium --with-deps

      - name: Run Master Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Hem kataloğu hem de yeni inen tüm logoları ekler
          git add catalog.json logos/*.png
          # Değişiklik yoksa hata vermemesi için || exit 0 ekledik
          git commit -m "Auto-update: Catalog and Logos [skip ci]" || exit 0
          git push
