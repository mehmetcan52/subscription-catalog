<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abonelik Borsası | Güncel Fiyatlar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                Abonelik Borsası
            </h1>
            <p class="text-gray-400 italic">210+ Servis, Canlı Fiyat Takibi</p>
            <div id="last-update" class="text-xs text-gray-500 mt-2">Yükleniyor...</div>
        </header>

        <div class="mb-8 flex flex-col md:flex-row gap-4">
            <input type="text" id="search" placeholder="Servis ara... (Netflix, Spotify, ChatGPT)" 
                   class="flex-1 bg-gray-800 border border-gray-700 p-4 rounded-xl focus:outline-none focus:border-blue-500 transition shadow-lg">
        </div>

        <div id="catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        async function loadCatalog() {
            try {
                const response = await fetch('catalog.json');
                const data = await response.json();
                const grid = document.getElementById('catalog-grid');
                const lastUpdate = document.getElementById('last-update');
                
                lastUpdate.innerText = `Son Güncelleme: ${new Date(data.lastUpdated).toLocaleString('tr-TR')}`;

                function render(services) {
                    grid.innerHTML = services.map(s => `
                        <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 hover:border-blue-500 transition-all duration-300 shadow-xl group">
                            <div class="flex items-center gap-4 mb-4">
                                <img src="${s.logoUrl}" class="w-16 h-16 rounded-xl object-contain bg-white p-1 shadow-md" onerror="this.src='https://via.placeholder.com/64?text=?'">
                                <div>
                                    <h3 class="text-xl font-bold">${s.name}</h3>
                                    <span class="text-xs text-gray-500 uppercase tracking-widest">${s.category}</span>
                                </div>
                            </div>
                            
                            <div class="space-y-3">
                                ${s.plans.map(p => `
                                    <div class="flex justify-between items-center bg-gray-900/50 p-3 rounded-lg border border-gray-700/50">
                                        <span class="text-gray-300 font-medium">${p.name}</span>
                                        <span class="text-xl font-bold text-blue-400">
                                            ${p.prices.TRY ? p.prices.TRY + ' ₺' : (p.prices.USD ? p.prices.USD + ' $' : 'Fiyat Yok')}
                                        </span>
                                    </div>
                                `).join('')}
                            </div>

                            ${s.history && s.history.length > 0 ? `
                                <div class="mt-4 pt-4 border-t border-gray-700">
                                    <p class="text-xs text-gray-500 mb-2 italic">Fiyat Değişim Geçmişi:</p>
                                    <div class="flex flex-wrap gap-2">
                                        ${s.history.map(h => `
                                            <span class="text-[10px] bg-blue-900/30 text-blue-300 px-2 py-1 rounded border border-blue-800/50">
                                                ${h.date}: ${h.price}₺
                                            </span>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `).join('');
                }

                render(data.services);

                // Arama Fonksiyonu
                document.getElementById('search').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = data.services.filter(s => 
                        s.name.toLowerCase().includes(term) || 
                        s.category.toLowerCase().includes(term)
                    );
                    render(filtered);
                });

            } catch (err) {
                console.error("Katalog yüklenirken hata:", err);
            }
        }
        loadCatalog();
    </script>
</body>
</html>
